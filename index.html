<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 가계부</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 80px; }
        button { margin-top: 10px; }
        #list { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>💰 가계부 웹사이트</h2>
    
    <div class="input-group">
        <label>항목:</label>
        <input type="text" id="item" placeholder="예: 점심 식사">
    </div>
    <div class="input-group">
        <label>금액:</label>
        <input type="number" id="amount" placeholder="0">
    </div>
    <button onclick="saveData()">저장하기</button>

    <div id="list">
        <h3>내역 목록</h3>
        <ul id="expense-list"></ul>
    </div>

    <script type="module">
        // Firebase 설정 데이터는 Firebase 콘솔에서 확인하여 넣어주세요!
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            // 여기에 본인의 Firebase 설정값을 붙여넣으세요
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 데이터 저장 함수
        window.saveData = async () => {
            const item = document.getElementById('item').value;
            const amount = document.getElementById('amount').value;
            
            try {
                await addDoc(collection(db, "expenses"), {
                    item: item,
                    amount: Number(amount),
                    date: new Date()
                });
                alert("저장 성공!");
                location.reload(); 
            } catch (e) {
                console.error("에러 발생: ", e);
            }
        };
    </script>
</body>
</html>
